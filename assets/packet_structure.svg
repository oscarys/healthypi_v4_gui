<svg width="100%" viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" role="img">
<title>HealthyPi v4 serial packet structure</title>
<desc>Byte-by-byte layout of the 27-byte HealthyPi v4 USB serial packet.</desc>

<style>
  text { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .label  { font-size: 11px; fill: #94a3b8; }
  .title  { font-size: 12px; font-weight: 600; fill: #e2e8f0; }
  .mono   { font-size: 13px; font-weight: 700; fill: #f8fafc; font-family: ui-monospace, monospace; }
  .sub    { font-size: 10px; fill: #94a3b8; }
  .note   { font-size: 10px; fill: #7dd3fc; }
  .head   { font-size: 14px; font-weight: 600; fill: #e2e8f0; }
</style>

<rect width="860" height="400" fill="#0f172a" rx="12"/>

<text class="head" x="430" y="30" text-anchor="middle">HealthyPi v4 — serial packet structure (27 bytes total)</text>
<text class="sub"  x="430" y="48" text-anchor="middle">115200 baud · 8N1 · confirmed against HealthyPiv4_Pi_only.ino firmware</text>

<!-- ── Section: Header ─────────────────────────────────────────────────── -->
<text class="label" x="24" y="76">Header (5 bytes)</text>

<rect x="24"  y="84" width="62" height="56" rx="6" fill="#0f4c3a" stroke="#1D9E75" stroke-width="1"/>
<text class="mono"  x="55"  y="108" text-anchor="middle">0x0A</text>
<text class="sub"   x="55"  y="126" text-anchor="middle">SOF 1</text>

<rect x="90"  y="84" width="62" height="56" rx="6" fill="#0f4c3a" stroke="#1D9E75" stroke-width="1"/>
<text class="mono"  x="121" y="108" text-anchor="middle">0xFA</text>
<text class="sub"   x="121" y="126" text-anchor="middle">SOF 2</text>

<rect x="156" y="84" width="62" height="56" rx="6" fill="#1e3a5f" stroke="#378ADD" stroke-width="1"/>
<text class="mono"  x="187" y="108" text-anchor="middle">0x14</text>
<text class="sub"   x="187" y="126" text-anchor="middle">Len LSB</text>

<rect x="222" y="84" width="62" height="56" rx="6" fill="#1e3a5f" stroke="#378ADD" stroke-width="1"/>
<text class="mono"  x="253" y="108" text-anchor="middle">0x00</text>
<text class="sub"   x="253" y="126" text-anchor="middle">Len MSB</text>

<rect x="288" y="84" width="62" height="56" rx="6" fill="#1e3a5f" stroke="#378ADD" stroke-width="1"/>
<text class="mono"  x="319" y="108" text-anchor="middle">0x02</text>
<text class="sub"   x="319" y="126" text-anchor="middle">Version</text>

<!-- ── Section: Payload waveforms ───────────────────────────────────────── -->
<text class="label" x="368" y="76">Payload — waveforms (12 bytes)</text>

<rect x="368" y="84" width="90" height="56" rx="6" fill="#4a1515" stroke="#D85A30" stroke-width="1"/>
<text class="mono" x="413" y="104" text-anchor="middle">ECG</text>
<text class="sub"  x="413" y="120" text-anchor="middle">int16 · [0:2]</text>
<text class="sub"  x="413" y="133" text-anchor="middle">filtered</text>

<rect x="462" y="84" width="90" height="56" rx="6" fill="#4a1515" stroke="#D85A30" stroke-width="1"/>
<text class="mono" x="507" y="104" text-anchor="middle">Respiration</text>
<text class="sub"  x="507" y="120" text-anchor="middle">int16 · [2:4]</text>
<text class="sub"  x="507" y="133" text-anchor="middle">impedance</text>

<rect x="556" y="84" width="90" height="56" rx="6" fill="#2d1f4e" stroke="#7F77DD" stroke-width="1"/>
<text class="mono" x="601" y="104" text-anchor="middle">PPG IR</text>
<text class="sub"  x="601" y="120" text-anchor="middle">int32 · [4:8]</text>
<text class="sub"  x="601" y="133" text-anchor="middle">negated ↑</text>

<rect x="650" y="84" width="90" height="56" rx="6" fill="#2d1f4e" stroke="#7F77DD" stroke-width="1"/>
<text class="mono" x="695" y="104" text-anchor="middle">PPG Red</text>
<text class="sub"  x="695" y="120" text-anchor="middle">int32 · [8:12]</text>
<text class="sub"  x="695" y="133" text-anchor="middle">negated ↑</text>

<!-- Footer -->
<text class="label" x="754" y="76">Footer</text>
<rect x="754" y="84" width="46" height="56" rx="6" fill="#0f4c3a" stroke="#1D9E75" stroke-width="1"/>
<text class="mono" x="777" y="108" text-anchor="middle">0x00</text>
<text class="sub"  x="777" y="126" text-anchor="middle">EOF 1</text>

<rect x="804" y="84" width="46" height="56" rx="6" fill="#0f4c3a" stroke="#1D9E75" stroke-width="1"/>
<text class="mono" x="827" y="108" text-anchor="middle">0x0B</text>
<text class="sub"  x="827" y="126" text-anchor="middle">EOF 2</text>

<!-- ── Row 2: derived vitals ─────────────────────────────────────────── -->
<text class="label" x="24" y="172">Payload — derived vitals (8 bytes · offsets [12:20])</text>

<rect x="24"  y="180" width="110" height="56" rx="6" fill="#3d2a00" stroke="#BA7517" stroke-width="1"/>
<text class="mono" x="79"  y="200" text-anchor="middle">Temperature</text>
<text class="sub"  x="79"  y="216" text-anchor="middle">int16 · [12:14]</text>
<text class="sub"  x="79"  y="229" text-anchor="middle">÷ 100 → °C</text>

<rect x="138" y="180" width="88" height="56" rx="6" fill="#3d2a00" stroke="#BA7517" stroke-width="1"/>
<text class="mono" x="182" y="200" text-anchor="middle">Resp rate</text>
<text class="sub"  x="182" y="216" text-anchor="middle">uint8 · [14]</text>
<text class="sub"  x="182" y="229" text-anchor="middle">BPM (FFT)</text>

<rect x="230" y="180" width="80" height="56" rx="6" fill="#1e3a5f" stroke="#378ADD" stroke-width="1"/>
<text class="mono" x="270" y="200" text-anchor="middle">SpO₂</text>
<text class="sub"  x="270" y="216" text-anchor="middle">uint8 · [15]</text>
<text class="sub"  x="270" y="229" text-anchor="middle">%</text>

<rect x="314" y="180" width="80" height="56" rx="6" fill="#1e3a5f" stroke="#378ADD" stroke-width="1"/>
<text class="mono" x="354" y="200" text-anchor="middle">Heart rate</text>
<text class="sub"  x="354" y="216" text-anchor="middle">uint8 · [16]</text>
<text class="sub"  x="354" y="229" text-anchor="middle">BPM</text>

<rect x="398" y="180" width="110" height="56" rx="6" fill="#1a1f2e" stroke="#444441" stroke-width="1"/>
<text class="mono" x="453" y="200" text-anchor="middle">BP sys / dia</text>
<text class="sub"  x="453" y="216" text-anchor="middle">uint8×2 · [17:19]</text>
<text class="sub"  x="453" y="229" text-anchor="middle">hardcoded 80/120</text>

<rect x="512" y="180" width="110" height="56" rx="6" fill="#0f4c3a" stroke="#1D9E75" stroke-width="1"/>
<text class="mono" x="567" y="200" text-anchor="middle">Status reg</text>
<text class="sub"  x="567" y="216" text-anchor="middle">uint8 · [19]</text>
<text class="sub"  x="567" y="229" text-anchor="middle">ADS1292R</text>

<!-- ── Notes ─────────────────────────────────────────────────────────── -->
<rect x="24" y="258" width="390" height="36" rx="6" fill="#0c1a2e" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="4 2"/>
<text class="note" x="36" y="272">PPG polarity: AFE4490 raw is inverted — parser.py negates IR and Red</text>
<text class="note" x="36" y="286">so all consumers (plots, logger, plugins) see peaks-up convention.</text>

<rect x="428" y="258" width="270" height="36" rx="6" fill="#0c1a2e" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="4 2"/>
<text class="note" x="440" y="272">Lead-off detection:</text>
<text class="note" x="440" y="286">(status &amp; 0x1F) == 0  →  leads connected</text>

<!-- ── Legend ──────────────────────────────────────────────────────────── -->
<line x1="24" y1="312" x2="836" y2="312" stroke="#1e293b" stroke-width="1"/>
<text class="label" x="24" y="330">Legend:</text>

<rect x="80"  y="319" width="14" height="14" rx="3" fill="#0f4c3a" stroke="#1D9E75" stroke-width="1"/>
<text class="sub" x="100" y="330">Framing</text>

<rect x="176" y="319" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#378ADD" stroke-width="1"/>
<text class="sub" x="196" y="330">Computed vitals</text>

<rect x="310" y="319" width="14" height="14" rx="3" fill="#4a1515" stroke="#D85A30" stroke-width="1"/>
<text class="sub" x="330" y="330">ECG / respiration</text>

<rect x="450" y="319" width="14" height="14" rx="3" fill="#2d1f4e" stroke="#7F77DD" stroke-width="1"/>
<text class="sub" x="470" y="330">PPG (polarity corrected)</text>

<rect x="616" y="319" width="14" height="14" rx="3" fill="#3d2a00" stroke="#BA7517" stroke-width="1"/>
<text class="sub" x="636" y="330">Temperature</text>

<text class="sub" x="430" y="360" text-anchor="middle">All multi-byte fields little-endian (LSB first) · Nominal 125 Hz sample rate</text>
</svg>
